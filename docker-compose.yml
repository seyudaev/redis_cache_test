version: '3.8'

services:
  app:
    build: ./app
    image: redis_cache/app
    container_name: app
    ports:
      - 8089
    links:
      - redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SAP_SERVERNAME=${SAP_SERVERNAME}

  nginx:
    build: ./nginx
    image: redis_cache/nginx
    container_name: nginx
    volumes:
      - ./nginx/template-variables:/etc/nginx/templates/10-variables.conf.template:ro
    environment:
      - SAP_SERVERNAME=${SAP_SERVERNAME}
    command: /bin/bash -c "envsubst < /etc/nginx/templates/10-variables.conf.template > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    ports:
      - 80:80
    links:
      - app

  redis:
    build: ./redis
    image: redis_cache/redis
    container_name: redis
    volumes:
      - ./redis/certs:/etc/certs
    expose:
      - 6379
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}